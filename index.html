<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>

    <title>Markov Tone</title>

    <link rel="stylesheet" type="text/css" href="style.css" />

    <script src="libraries/p5.min.js"></script>
  </head>

  <body>
    <h1>Markov with Tone.js</h1>

    <!-- 14.1 Understanding Inputs -->
    <!-- 14.2 Understanding Inputs -->
    <label for="order">Order (ngram size):</label>
    <input type="number" id="order" value="1" min="1" max="1400" />

    <!-- 14.3 Understanding inputs (Radio) -->
    <!-- 2: Get radio button values: -->
    <form>
      <fieldset>
        <legend>Select synth:</legend>

        <div>
          <input type="radio" id="Basic" name="synth" value="0" checked />
          <label for="huey">Basic</label>
        </div>

        <div>
          <input type="radio" id="AMSynth" name="synth" value="1" />
          <label for="dewey">AMSynth</label>
        </div>

        <div>
          <input type="radio" id="duoSynth" name="synth" value="2" />
          <label for="duoSynth">duoSynth</label>
        </div>

        <div>
          <input type="radio" id="fmSynth" name="synth" value="3" />
          <label for="fmSynth">fmSynth</label>
        </div>

        <div>
          <input type="radio" id="metalSynth" name="synth" value="4" />
          <label for="metalSynth">metalSynth</label>
        </div>

        <div>
          <input type="radio" id="monoSynth" name="synth" value="5" />
          <label for="duoSynth">monoSynth</label>
        </div>

        <div>
          <input type="radio" id="MembraneSynth" name="synth" value="6" />
          <label for="duoSynth">MembraneSynth</label>
        </div>
      </fieldset>
    </form>
    <p>
      <button id="generate">Generate</button>
      <!-- 2: Get radio button values: -->
      <button id="restart">Restart</button>
      <!-- 2: Get radio button values: -->
    </p>

    <p>Wait for Notes to Generate</p>
    <button id="basic">Play</button>

    <script src="./functions.js"></script>
    <script src="./markov.js"></script>
  </body>
</html>
